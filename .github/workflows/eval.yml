# Eval pipeline — two triggers:
#   pull_request: runs the deterministic retrieval tier only (free, fast, blocking).
#   workflow_dispatch: choose any tier manually (retrieval / judge-slice / full).
#
# The judge tiers stay manual-only (cost + LLM variance; not appropriate as a per-PR gate).
name: eval

on:
  pull_request:
    paths:
      - "src/**"
      - "sql/**"
      - "evals/**"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      mode:
        description: "Which eval layer to run"
        type: choice
        default: retrieval
        options:
          - retrieval # deterministic Recall@5 vs fixture baseline (free, blocking-ready)
          - judge-slice # temp-0 LLM-as-judge slice (needs LLM secrets)
          - full # full frontier-judge run (needs LLM secrets)

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: blackbox
          POSTGRES_PASSWORD: blackbox
          POSTGRES_DB: blackbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blackbox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry
      - run: poetry install

      # Seed a hermetic corpus: schema + the committed fixture (25 gold + 60
      # distractors with embeddings). No NTSB download, no corpus embedding.
      - name: Seed fixture into Postgres
        env:
          PGPASSWORD: blackbox
        run: |
          psql -h localhost -U blackbox -d blackbox -v ON_ERROR_STOP=1 -q -f sql/schema.sql
          psql -h localhost -U blackbox -d blackbox -v ON_ERROR_STOP=1 -q -f evals/fixtures/seed.sql

      - name: Run eval (${{ inputs.mode || 'retrieval' }})
        env:
          DATABASE_URL: postgresql://blackbox:blackbox@localhost:5432/blackbox
          # Only needed for the judge tiers; set as repo secrets (free Groq key).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          JUDGE_MODEL: ${{ secrets.JUDGE_MODEL }}
        run: |
          MODE="${{ inputs.mode || 'retrieval' }}"
          case "$MODE" in
            retrieval)
              # Deterministic gate: fail if Recall@5 regresses past tolerance.
              poetry run python -m evals.run --mode retrieval \
                --baseline evals/fixtures/ci_baseline.json --max-drop 0.01
              ;;
            judge-slice)
              poetry run python -m evals.run --mode judge-slice --limit 12
              ;;
            full)
              poetry run python -m evals.run --mode full
              ;;
          esac
