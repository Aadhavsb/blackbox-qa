# Manually-triggered eval pipeline (NOT a merge gate — see evals/README.md).
# Built so a `pull_request` trigger can be added later to make it blocking.
name: eval

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Which eval layer to run"
        type: choice
        default: retrieval
        options:
          - retrieval
          - judge-slice
          - full

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: blackbox
          POSTGRES_PASSWORD: blackbox
          POSTGRES_DB: blackbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blackbox"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -m evals.run --mode "${{ inputs.mode }}"
        env:
          DATABASE_URL: postgresql://blackbox:blackbox@localhost:5432/blackbox
